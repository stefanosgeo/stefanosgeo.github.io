baseURL = 'https://stefanosgeo.github.io/'
languageCode = 'en-us'
title = 'Stefanos Georgopoulos'
theme = 'PaperMod'
summaryLength = 30

[taxonomies]
tag = "tags"

[params]
mainSections = ["posts"]
ShowSectionMenus = false
ShowReadingTime = true
ShowWordCount = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowPostNavLinks = true
ShowToc = true
TocOpen = false
env = "production"
description = "Personal blog of Stefanos Georgopoulos - PHP Developer passionate about Laravel and DevOps at the University of Erlangen-Nürnberg"
author = "Stefanos Georgopoulos"

[params.assets]
favicon = "/favicon.ico"
favicon16x16 = "/favicon-16x16.png"
favicon32x32 = "/favicon-32x32.png"
apple_touch_icon = "/apple-touch-icon.png"

[params.profileMode]
enabled = true
title = "Stefanos Georgopoulos"
subtitle = "PHP Developer | Laravel | DevOps"
imageUrl = "images/profile.webp"
imageTitle = "Profile"
imageWidth = 250
imageHeight = 250

[[params.profileMode.buttons]]
name = "Posts"
url = "/posts"

[[params.profileMode.buttons]]
name = "Snippets"
url = "/snippets"

[[params.profileMode.buttons]]
name = "About"
url = "/about"

[[params.profileMode.buttons]]
name = "GitHub"
url = "https://github.com/stefanosgeo"

[[params.socialIcons]]
name = "github"
title = "GitHub"
url = "https://github.com/stefanosgeo"

[outputs]
home = ["HTML", "RSS", "JSON"]

[pagination]
pagerSize = 5

[menu]
[[menu.main]]
identifier = "home"
name = "Home"
url = "/"
weight = 1

[[menu.main]]
identifier = "posts"
name = "Posts"
url = "/posts/"
weight = 2

[[menu.main]]
identifier = "snippets"
name = "Snippets"
url = "/snippets/"
weight = 3

[[menu.main]]
identifier = "about"
name = "About"
url = "/about/"
weight = 4

[[menu.main]]
identifier = "search"
name = "Search"
url = "/search/"
weight = 5

[[module.mounts]]
source = 'static'
target = 'static'

[[module.mounts]]
source = 'images'
target = 'static/images'
